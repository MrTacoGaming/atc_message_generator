<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Script Generator</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://tailwindcss.com"></script>
    <style>
        /* Custom formatting for blocks when copied as raw text */
        .transcript-line {
            white-space: pre-wrap;
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 0.375rem;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans p-6">

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- Header -->
        <header class="border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold tracking-tight text-sky-400">ATC Script Generator</h1>
            <p class="text-slate-400 text-sm mt-1">Select a flight phase. Enter details on the left to instantly build the split transcript on the right.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Left Column: Phase Selector & Variable Inputs (5 cols wide) -->
            <div class="lg:col-span-5 space-y-4">
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                    <!-- Dropdown Container -->
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Select Flight Phase:</label>
                        <select id="presetSelect" class="bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm text-sky-400 font-medium focus:outline-none focus:border-sky-500 w-full cursor-pointer">
                            <option value="clearance">1. Clearance Delivery</option>
                            <option value="push_taxi">2. Pushback & Taxi</option>
                            <option value="takeoff">3. Takeoff / Departure</option>
                            <option value="cruise">4. Climb / Cruise</option>
                            <option value="approach">5. Descent / Approach</option>
                            <option value="landing">6. Landing / Arrival</option>
                        </select>
                    </div>
                </div>

                <!-- Variable Controls Panel -->
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg flex flex-col">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Variable Inputs</h2>
                        <button id="clearBtn" class="bg-rose-950/40 hover:bg-rose-900/60 text-rose-400 border border-rose-800/60 text-xs px-2.5 py-1 rounded font-medium transition-colors">Clear Info</button>
                    </div>
                    <div id="dynamicFields" class="space-y-3 max-h-[550px] overflow-y-auto pr-2">
                        <!-- Generated by JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Right Column: Radio Transcript Display (7 cols wide) -->
            <div class="lg:col-span-7 flex flex-col">
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg flex-1 flex flex-col">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Radio Transcript Output</h2>
                        <button id="copyBtn" class="bg-sky-600 hover:bg-sky-500 text-white text-xs px-4 py-2 rounded font-medium transition-colors">Copy Transcript</button>
                    </div>
                    <!-- Stylized Output Container -->
                    <div id="outputScript" class="w-full flex-1 bg-slate-950 border border-slate-700 rounded-lg p-5 font-mono select-all min-h-[500px] space-y-3 overflow-y-auto max-h-[670px]">
                        <!-- Live Separated Blocks Generated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        const dynamicFields = document.getElementById('dynamicFields');
        const outputScript = document.getElementById('outputScript');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const presetSelect = document.getElementById('presetSelect');

        // Master Phrase Templates
        const ATCPresets = {
            clearance: "Pilot: {dep_airport} Ground, Lufthansa {flight_num}, {ac_type}, Instrument Flight Rules to {dest_airport}, Gate {gate_num}, Requesting Clearance.\n\nATC: Lufthansa {flight_num}, {dep_airport} Ground, Cleared to {dest_airport} via {sid}, Flight Level {initial_alt}, Squawk {squawk}.\n\nPilot: Cleared to {dest_airport} via {sid}, Flight Level {initial_alt}, Squawk {squawk}, Lufthansa {flight_num}.\n\nATC: Lufthansa {flight_num}, Readback correct, Contact Ground on {ground_freq} when ready for pushback.",
            
            push_taxi: "Pilot: Ground, Lufthansa {flight_num}, Requesting Pushback and Start.\n\nATC: Lufthansa {flight_num}, Pushback and Start approved, Face {direction}.\n\nPilot: Pushback and Start approved, facing {direction}, Lufthansa {flight_num}.\n\n(After Pushback)\n\nPilot: Ground, Lufthansa {flight_num}, Ready to Taxi.\n\nATC: Lufthansa {flight_num}, Taxi to Runway {rwy} via {taxiway_route}, Hold short of Runway {rwy}, contact Tower on {tower_freq} when ready.\n\nPilot: Taxi to Runway {rwy} via {taxiway_route}, Hold short of Runway {rwy}, Lufthansa {flight_num}, contact Tower on {tower_freq} when ready.",
            
            takeoff: "Pilot: {dep_airport} Tower, Lufthansa {flight_num}, Holding short of Runway {rwy}.\n\nATC: Lufthansa {flight_num}, Tower, Runway {rwy}, Cleared for Takeoff, Wind {wind_dir} at {wind_speed} Knots.\n\nPilot: Runway {rwy}, Cleared for Takeoff, Lufthansa {flight_num}.\n\nATC: Lufthansa {flight_num}, Contact Departure on {dep_freq}.\n\nPilot: Switching to Departure on {dep_freq}, Lufthansa {flight_num}.",
            
            cruise: "Pilot: {region} Control, Lufthansa {flight_num}, Maintaining Flight Level {cruise_alt}.\n\nATC: Lufthansa {flight_num}, {region} Control, Radar contact.",
            
            approach: "Pilot: {dest_airport} Approach, Lufthansa {flight_num}, Descending through Flight Level {current_alt}.\n\nATC: Lufthansa {flight_num}, Descend and maintain {maintain_alt_ft}, Cleared for the ILS Runway {dest_rwy} Approach.\n\nPilot: Descend and maintain {maintain_alt_ft}, Cleared for ILS Runway {dest_rwy}, Lufthansa {flight_num}.",
            
            landing: "ATC: Lufthansa {flight_num}, contact Tower on {tower_freq}.\n\nPilot: Switching to Tower on {tower_freq}, Lufthansa {flight_num}.\n\nPilot: {dest_airport} Tower, Lufthansa {flight_num}, Established ILS Runway {dest_rwy}.\n\nATC: Lufthansa {flight_num}, Tower, Wind {wind_dir} at {wind_speed} Knots, Runway {dest_rwy}, Cleared to Land.\n\nPilot: Runway {dest_rwy}, Cleared to Land, Lufthansa {flight_num}.\n\nATC: Lufthansa {flight_num}, Exit Runway when able, Contact Ground on {ground_freq}.\n\nPilot: Switching to Ground on {ground_freq}, Lufthansa {flight_num}.\n\nPilot: {dest_airport} Ground, Lufthansa {flight_num}, Vacated Runway {dest_rwy}, Requesting Taxi to Gate.\n\nATC: Lufthansa {flight_num}, Taxi to Gate {gate_num} via {dest_taxi_route}.\n\nPilot: Taxi to Gate {gate_num} via {dest_taxi_route}, Lufthansa {flight_num}."
        };

        const VariableLabels = {
            dep_airport: "Departure Airport",
            dest_airport: "Destination Airport",
            flight_num: "Flight Number",
            ac_type: "Aircraft Type",
            gate_num: "Gate Number",
            sid: "Departure Route / SID",
            initial_alt: "Initial Altitude / FL",
            squawk: "Squawk Code",
            ground_freq: "Ground Frequency",
            direction: "Pushback Direction",
            rwy: "Departure Runway",
            taxiway_route: "Taxiway Route Out",
            tower_freq: "Tower Frequency",
            wind_dir: "Wind Direction",
            wind_speed: "Wind Speed",
            dep_freq: "Departure Frequency",
            region: "Control Region",
            cruise_alt: "Cruising Altitude",
            current_alt: "Current Altitude",
            maintain_alt_ft: "Descend To Altitude",
            dest_rwy: "Destination Runway",
            dest_taxi_route: "Taxiway Route In"
        };

        function getActiveTemplate() {
            return ATCPresets[presetSelect.value];
        }

        function extractVariables(text) {
            const matches = text.match(/{\w+}/g) || [];
            return [...new Set(matches.map(m => m.slice(1, -1)))];
        }

        function updateFormFields() {
            const template = getActiveTemplate();
            const variables = extractVariables(template);
            const savedValues = JSON.parse(localStorage.getItem('atc_values') || '{}');
            
            dynamicFields.innerHTML = '';

            variables.forEach(v => {
                const value = savedValues[v] || '';
                const displayLabel = VariableLabels[v] || v;
                const fieldRow = document.createElement('div');
                fieldRow.className = 'flex flex-col gap-1';
                fieldRow.innerHTML = `
                    <label class="text-[11px] font-semibold text-slate-400 uppercase tracking-wide">${displayLabel}</label>
                    <input type="text" data-var="${v}" value="${value}" class="var-input bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-sky-500 font-mono w-full">
                `;
                dynamicFields.appendChild(fieldRow);
            });

            attachInputListeners();
            compileScript();
        }

        function attachInputListeners() {
            document.querySelectorAll('.var-input').forEach(input => {
                input.addEventListener('input', () => {
                    const savedValues = JSON.parse(localStorage.getItem('atc_values') || '{}');
                    savedValues[input.dataset.var] = input.value;
                    localStorage.setItem('atc_values', JSON.stringify(savedValues));
                    compileScript();
                });
            });
        }

        function compileScript() {
            const rawTemplate = getActiveTemplate();
            const savedValues = JSON.parse(localStorage.getItem('atc_values') || '{}');
            
            // Clean container
            outputScript.innerHTML = '';

            // Split into separate communication transmissions based on double line breaks
            const blocks = rawTemplate.split('\n\n');

            blocks.forEach(block => {
                if(!block.trim()) return;

                // Process bracket replacement variable tokens
                let processedText = block;
                const blockVars = extractVariables(block);
                
                blockVars.forEach(v => {
                    const tag = `{${v}}`;
                    const value = (savedValues[v] && savedValues[v].trim()) || `[${(VariableLabels[v] || v).toUpperCase()}]`;
                    processedText = processedText.split(tag).join(value);
                });

                // Create visually distinct components
                const blockDiv = document.createElement('div');
                blockDiv.className = 'transcript-line border font-mono text-sm leading-relaxed ';

                if (processedText.startsWith('Pilot:')) {
                    // Style format for Pilot
                    blockDiv.classList.add('bg-slate-900', 'border-slate-700', 'text-slate-100', 'border-l-4', 'border-l-emerald-500');
                } else if (processedText.startsWith('ATC:')) {
                    // Style format for ATC Controllers
                    blockDiv.classList.add('bg-slate-800/60', 'border-slate-700', 'text-amber-400', 'border-l-4', 'border-l-sky-500');
                } else {
                    // Stage notes or procedural instructions (e.g., After Pushback)
                    blockDiv.classList.add('bg-transparent', 'border-transparent', 'text-slate-500', 'italic', 'text-xs', 'p-1', 'my-1');
                }

                blockDiv.textContent = processedText;
                outputScript.appendChild(blockDiv);
            });
        }

        // Handle full storage wipeout
        clearBtn.addEventListener('click', () => {
            if(confirm("Are you sure you want to clear all input fields?")) {
                localStorage.removeItem('atc_values');
                updateFormFields();
            }
        });

        presetSelect.addEventListener('change', updateFormFields);

        // Copy raw text function reading visible elements sequentially
        copyBtn.addEventListener('click', () => {
            const lines = [];
            document.querySelectorAll('.transcript-line').forEach(el => {
                lines.push(el.textContent);
            });
            
            navigator.clipboard.writeText(lines.join('\n\n'));
            
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'Copied Transcript!';
            copyBtn.classList.replace('bg-sky-600', 'bg-emerald-600');
            setTimeout(() => {
                copyBtn.textContent = originalText;
                copyBtn.classList.replace('bg-emerald-600', 'bg-sky-600');
            }, 1500);
        });

        // Application start setup
        window.addEventListener('DOMContentLoaded', () => {
            updateFormFields();
        });
    </script>
</body>
</html>

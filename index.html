<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC Script Generator</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans p-6">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- Header -->
        <header class="border-b border-slate-700 pb-4">
            <h1 class="text-3xl font-bold tracking-tight text-sky-400">✈️ ATC Script Generator</h1>
            <p class="text-slate-400 text-sm mt-1">Define templates using curly braces (e.g., {acid}) to automatically generate fields.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Left Column: Template Config -->
            <div class="space-y-4">
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Preset Template</label>
                    <textarea id="templateInput" rows="6" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-slate-200 font-mono text-sm focus:outline-none focus:border-sky-500 transition-colors">ATC: {acid}, cleared to {dest} via {route}, climb via SID, flight level {fl}. Squawk {squawk}.</textarea>
                </div>

                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
                    <h2 class="text-sm font-semibold text-slate-300 mb-3">Dynamic Input Fields</h2>
                    <div id="dynamicFields" class="space-y-3">
                        <!-- Generated by JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Right Column: Output -->
            <div class="flex flex-col">
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg flex-1 flex flex-col">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-sm font-semibold text-slate-300">Generated ATC Script</h2>
                        <button id="copyBtn" class="bg-sky-600 hover:bg-sky-500 text-white text-xs px-3 py-1.5 rounded font-medium transition-colors">Copy Text</button>
                    </div>
                    <div id="outputScript" class="w-full flex-1 bg-slate-950 border border-slate-700 rounded-lg p-4 font-mono text-amber-400 whitespace-pre-wrap select-all">
                        <!-- Live Output -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        const templateInput = document.getElementById('templateInput');
        const dynamicFields = document.getElementById('dynamicFields');
        const outputScript = document.getElementById('outputScript');
        const copyBtn = document.getElementById('copyBtn');

        // Load saved template if it exists
        if (localStorage.getItem('atc_template')) {
            templateInput.value = localStorage.getItem('atc_template');
        }

        // Detect variables inside curly brackets {variable}
        function extractVariables(text) {
            const matches = text.match(/{\w+}/g) || [];
            return [...new Set(matches.map(m => m.slice(1, -1)))];
        }

        // Build HTML inputs based on found variables
        function updateFormFields() {
            const currentTemplate = templateInput.value;
            localStorage.setItem('atc_template', currentTemplate);
            
            const variables = extractVariables(currentTemplate);
            const savedValues = JSON.parse(localStorage.getItem('atc_values') || '{}');
            
            // Retain old values while rebuilding form DOM
            dynamicFields.innerHTML = variables.length === 0 
                ? '<p class="text-xs text-slate-500 italic">No fields detected. Type {field_name} in the box above.</p>' 
                : '';

            variables.forEach(v => {
                const value = savedValues[v] || '';
                const fieldRow = document.createElement('div');
                fieldRow.className = 'flex items-center gap-2';
                fieldRow.innerHTML = `
                    <label class="w-24 text-xs font-mono text-slate-400 uppercase tracking-wider truncate">${v}</label>
                    <input type="text" data-var="${v}" value="${value}" class="var-input flex-1 bg-slate-950 border border-slate-700 rounded px-2.5 py-1.5 text-sm text-slate-200 focus:outline-none focus:border-sky-500 font-mono">
                `;
                dynamicFields.appendChild(fieldRow);
            });

            attachInputListeners();
            compileScript();
        }

        // Save input values and trigger live compiler
        function attachInputListeners() {
            document.querySelectorAll('.var-input').forEach(input => {
                input.addEventListener('input', () => {
                    const savedValues = JSON.parse(localStorage.getItem('atc_values') || '{}');
                    savedValues[input.dataset.var] = input.value;
                    localStorage.setItem('atc_values', JSON.stringify(savedValues));
                    compileScript();
                });
            });
        }

        // Replace tags in template with form inputs
        function compileScript() {
            let script = templateInput.value;
            const inputs = document.querySelectorAll('.var-input');
            
            inputs.forEach(input => {
                const tag = `{${input.dataset.var}}`;
                const value = input.value.trim() || `[${input.dataset.var.toUpperCase()}]`;
                script = script.split(tag).join(value);
            });

            outputScript.textContent = script;
        }

        // Clipboard Copy Action
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(outputScript.textContent);
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'Copied!';
            copyBtn.classList.replace('bg-sky-600', 'bg-emerald-600');
            setTimeout(() => {
                copyBtn.textContent = originalText;
                copyBtn.classList.replace('bg-emerald-600', 'bg-sky-600');
            }, 1500);
        });

        // App Initializers
        templateInput.addEventListener('input', updateFormFields);
        window.addEventListener('DOMContentLoaded', updateFormFields);
    </script>
</body>
</html>
